name: Create Release

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract pack version
        id: version
        run: |
          VERSION=$(jq -r '.pack.pack_version' pack.mcmeta)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Pack version: $VERSION"

      - name: Build resource pack ZIP
        run: |
          zip -r "Pepmon270-64x-PvP-Pack-v${{ steps.version.outputs.version }}.zip" \
            assets/ \
            pack.mcmeta

      - name: Check if release exists
        id: check_release
        continue-on-error: true
        run: |
          gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        if: steps.check_release.outcome == 'failure'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          artifacts: Pepmon270-64x-PvP-Pack-v${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
